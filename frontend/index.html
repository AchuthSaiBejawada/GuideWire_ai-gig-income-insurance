<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gig Insurance Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1> Gig Insurance</h1>
  <p>Protecting your daily income</p>
</header>

<div class="container">

  <!-- Worker Info -->
  <div class="card">
    <h2>👤 Worker Profile</h2>
    <p><strong>Name:</strong> Rahul</p>
    <p><strong>Platform:</strong> Swiggy</p>
    <p><strong>City:</strong> Hyderabad</p>
    <p><strong>Daily Income:</strong> ₹700</p>
  </div>

  <!-- Insurance Plan -->
  <div class="card">
    <h2>💰 Insurance Plan</h2>
    <p><strong>Weekly Premium:</strong> ₹30</p>
    <p><strong>Coverage:</strong> ₹2000</p>
    <p><strong>Status:</strong> Active ✅</p>
  </div>

  <!-- Risk + AI -->
  <div class="card">
    <h2>🤖 AI Risk Analysis</h2>
    <p><strong>Risk Score:</strong> 0.5</p>
    <p><strong>Area Risk:</strong> Medium</p>
  </div>

  <!-- Trigger -->
  <div class="card action">
    <h2>🌧 Disruption Simulation</h2>
    <button onclick="triggerRain()">Simulate Heavy Rain</button>
    <p id="result"></p>
  </div>

</div>

</body>
<script src="script.js"></script>
</html>
